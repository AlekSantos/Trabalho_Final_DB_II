version: '3.8'

services:
  mongo1:
    image: mongo:6.0
    container_name: mongo1
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - mongo-net

  mongo2:
    image: mongo:6.0
    container_name: mongo2
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    networks:
      - mongo-net

  mongo3:
    image: mongo:6.0
    container_name: mongo3
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    networks:
      - mongo-net

  mongo-init:
    image: mongo:6.0
    container_name: mongo-init
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    networks:
      - mongo-net
    restart: "no"
    volumes:
      - ./mongo-init.js:/mongo-init.js:ro
    entrypoint: |
      bash -c "
      until mongosh --host mongo1:27017 --eval 'db.runCommand(\"ping\")' &>/dev/null; do
        echo 'Aguardando mongo1 inicializar...'
        sleep 2
      done
      mongosh --host mongo1:27017 --quiet /mongo-init.js
      until mongosh --host mongo1:27017 --quiet --eval 'rs.status().members.some(m => m.stateStr === \"PRIMARY\")' 2>/dev/null | grep -q 'true'; do
        echo 'Aguardando eleição do Primary do Replica Set...'
        sleep 2
      done
      echo 'Replica Set pronto com um Primary!'
      "

  app:
    build:
      context: ../scripts
      dockerfile: Dockerfile
    container_name: eventos-app
    depends_on:
      - mongo-init
    environment:
      MONGO_URI: "mongodb://mongo1:27017,mongo2:27017,mongo3:27017/?replicaSet=rs0"
      MONGO_DB: "eventos_urbanos"
    ports:
      - "8501:8501"
    networks:
      - mongo-net
    restart: unless-stopped
    volumes:
      - ../scripts:/app
      - ../dataset:/app/dataset
      - ../documentacao:/app/documentacao

networks:
  mongo-net:
    driver: bridge

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data: